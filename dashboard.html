<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Dashboard - Monitoreo Seguridad</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        theme:{
            extend:{
                colors:{
                    primary: "#0A2540",
                    secondary: "#00B4D8",
                    light: "#90E0EF"
                },
                fontFamily:{
                    robotoCondensed: ['Roboto Condensed', 'sans-serif']
                }
            }
        }
    }
</script>

</head>

<body class="bg-gray-100 font-robotoCondensed">

<div class="flex h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-primary text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-gray-600">
            Seguridad
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <a href="dashboard.html" class="block p-2 rounded-lg bg-secondary">📊 Dashboard</a>
            <a href="reportes.html" class="block p-2 rounded-lg hover:bg-secondary">⚠️ Reportar Hallazgo</a>
            <a href="mapa.html" class="block p-2 rounded-lg hover:bg-secondary">🗺️ Mapa</a>
        </nav>

        <div class="p-4 border-t border-gray-500">
            <button class="w-full bg-red-500 py-2 rounded hover:bg-red-600 transition">
                Cerrar sesión
            </button>
        </div>
    </aside>

    
    <div class="flex-1 flex flex-col">

        <header class="bg-white shadow p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-primary">
                Dashboard
            </h1>
            <div class="flex items-center gap-3">
                <span class="text-sm" id="nombreUsuario"></span>
                <img src="https://via.placeholder.com/40"
                class="w-10 h-10 rounded-full object-cover border">
            </div>
        </header>

        
        <main class="p-6 space-y-6 overflow-auto">

            <!-- Tarjetas -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                <div class="bg-white p-6 rounded-xl shadow hover:shadow-lg transition">
                    <h2 class="text-gray-500 text-sm">Total Reportes</h2>
                    <p id="total" class="text-3xl font-bold text-primary">0</p>
                </div>

                <div class="bg-white p-6 rounded-xl shadow hover:shadow-lg transition">
                    <h2 class="text-gray-500 text-sm">Riesgo Alto</h2>
                    <p id="altos" class="text-3xl font-bold text-red-500">0</p>
                </div>

                <div class="bg-white p-6 rounded-xl shadow hover:shadow-lg transition">
                    <h2 class="text-gray-500 text-sm">Riesgo Bajo</h2>
                    <p id="bajos" class="text-3xl font-bold text-green-500">0</p>
                </div>

            </div>

            <!-- Graficos Dashboard -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-lg font-bold text-primary mb-4">
                        Reportes por Nivel de Riesgo
                    </h2>
                   <canvas id="graficoRiesgo" width="400" height="300"></canvas>
                </div>

                <div class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-lg font-bold text-primary mb-4">
                        Reportes últimos 7 días
                    </h2>
                    <canvas id="graficoTiempo" width="500" height="300"></canvas>
                </div>

            </div>

          
            <div class="bg-white p-6 rounded-xl shadow">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-primary">
                        Reportes recientes
                    </h2>
                    <a href="reportes.html"
                    class="text-sm bg-secondary text-white px-3 py-1 rounded hover:bg-cyan-600">
                        + Nuevo
                    </a>
                </div>

                <div id="listaDashboard" class="space-y-3"></div>
            </div>

        </main>

    </div>
</div>



<script>
    const usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));

    if(!usuarioActivo){
        window.location.href = "index.html";
    }
    document.getElementById("nombreUsuario").textContent = usuarioActivo.nombre;
    async function cargarDashboard(){

    let reportesJSON = [];
    try {
        const res = await fetch("reportes.json");
        const data = await res.json();
        reportesJSON = data.reportes;
    } catch {}

    let reportesLocal = JSON.parse(localStorage.getItem("reportes")) || [];

    // combinar
    let reportes = [...reportesJSON, ...reportesLocal];
    
 

    //generar días
    const hoy = new Date();
    const dias = [];

    for(let i = 6; i >= 0; i--){
        const d = new Date();
        d.setDate(hoy.getDate() - i);

        const clave = d.getFullYear() + "-" +
                    String(d.getMonth()+1).padStart(2,'0') + "-" +
                    String(d.getDate()).padStart(2,'0');

        dias.push(clave);
    }

    //contar reportes
    const reportesPorDia = {};

    reportes.forEach(r => {
        const fechaObj = new Date(r.fecha);

        const clave = fechaObj.getFullYear() + "-" +
                    String(fechaObj.getMonth()+1).padStart(2,'0') + "-" +
                    String(fechaObj.getDate()).padStart(2,'0');

        if(!reportesPorDia[clave]){
            reportesPorDia[clave] = 0;
        }

        reportesPorDia[clave]++;
    });

    const valores = dias.map(d => reportesPorDia[d] || 0);

    let total = reportes.length;
    let altos = 0;
    let medios = 0;
    let bajos = 0;

    reportes.forEach(r => {
        if(r.riesgo === "alto") altos++;
        if(r.riesgo === "medio") medios++;
        if(r.riesgo === "bajo") bajos++;
    });

    document.getElementById("total").textContent = total;
    document.getElementById("altos").textContent = altos;
    document.getElementById("bajos").textContent = bajos;

    const lista = document.getElementById("listaDashboard");
    lista.innerHTML = "";

    const recientes = reportes.slice(-5).reverse();

    recientes.forEach(r => {

        const color =
            r.riesgo === "alto" ? "text-red-500" :
            r.riesgo === "medio" ? "text-yellow-500" :
            "text-green-500";

        const estadoColor =
            r.estado === "pendiente"
            ? "bg-yellow-100 text-yellow-700"
            : "bg-green-100 text-green-700";

        const boton = r.estado === "pendiente"
            ? `<button onclick="marcarSolucionado(${r.id})"
                class="text-xs bg-blue-500 text-white px-2 py-1 rounded hover:bg-blue-600">
                Solucionar
               </button>`
            : "";

        const item = `
        <div class="p-4 border rounded-lg flex justify-between items-center">
        
        <div>
            <p class="font-bold">${r.descripcion}</p>

            <p class="text-sm text-gray-500">
                ${new Date(r.fecha).toLocaleString()}
            </p>

            <p class="text-sm text-gray-500">
                Zona: ${r.zona || "Sin zona"}
            </p>
        </div>
        `;

        lista.innerHTML += item;
        
    });
    dibujarGraficoRiesgo(altos, bajos, medios);
    dibujarGraficoTiempo(dias, valores);
}

// cambiar estado
function marcarSolucionado(id){

    let reportes = JSON.parse(localStorage.getItem("reportes")) || [];

    reportes = reportes.map(r => {
        if(r.id === id){
            r.estado = "solucionado";
        }
        return r;
    });

    localStorage.setItem("reportes", JSON.stringify(reportes));

    cargarDashboard();
}

function dibujarGraficoRiesgo(altos, bajos, medios){

    const canvas = document.getElementById("graficoRiesgo");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const datos = [
        { label: "Alto", valor: altos, color: "#ef4444" },
        { label: "Medio", valor: medios, color: "#eab308" },
        { label: "Bajo", valor: bajos, color: "#22c55e" }
    ];

    const maxDatos = Math.max(...datos.map(d => d.valor));
    const max = Math.max(5, maxDatos);
    const padding = 40;
    const cantidad = datos.length;
    const anchoDisponible = canvas.width - padding * 2;
    const anchoBarra = anchoDisponible / cantidad * 0.6;
    const espacio = (anchoDisponible / cantidad) * 0.4;
    const base = canvas.height - 40;

    ctx.beginPath();
    ctx.moveTo(40, base);
    ctx.lineTo(canvas.width - 20, base);
    ctx.strokeStyle = "#000";
    ctx.stroke();

    const totalWidth = cantidad * anchoBarra + (cantidad - 1) * espacio;
    const ajusteDerecha = 10; 
    const offsetX = (canvas.width - totalWidth) / 2 + ajusteDerecha;
    datos.forEach((d, i) => {

        const x = offsetX + i * (anchoBarra + espacio);
        const altura = (d.valor / max) * 150;
        const y = base - altura;

        // barra
        ctx.fillStyle = d.color;
        ctx.fillRect(x, y, anchoBarra, altura);

        // Para que se vea el valor arriba de la barra
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(d.valor, x + 20, y - 5);

        // Para que se vea la etiqueta abajo de la barra 
        ctx.fillText(d.label, x + 10, base + 20);
    });
}

function dibujarGraficoTiempo(dias, valores){

    const canvas = document.getElementById("graficoTiempo");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const margen = 50;
    const base = canvas.height - margen;

    const max = Math.max(...valores, 5);

    const cantidad = dias.length;
    const anchoDisponible = canvas.width - margen * 2;

    const anchoBarra = (anchoDisponible / cantidad) * 0.6;
    const espacio = (anchoDisponible / cantidad) * 0.4;

    ctx.beginPath();
    ctx.moveTo(margen, base);
    ctx.lineTo(canvas.width - margen, base);
    ctx.stroke();

    dias.forEach((dia, i) => {

        const x = margen + i * (anchoBarra + espacio);
        const altura = (valores[i] / max) * 150;
        const y = base - altura;

        ctx.fillStyle = "#0A2540";
        ctx.fillRect(x, y, anchoBarra, altura);


        ctx.fillStyle = "#000";
        ctx.font = "12px sans-serif";
        ctx.fillText(valores[i], x + 5, y - 5);

        // Para que se vea en formato DD/MM en la barra
        const fechaObj = new Date(dia);
        const texto = fechaObj.toLocaleDateString("es-CL", {
            day: "2-digit",
            month: "2-digit"
        });

        ctx.fillText(texto, x + 5, base + 15);
    });
}

cargarDashboard();
</script>

</body>
</html>
