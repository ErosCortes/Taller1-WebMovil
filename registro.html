<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Monitoreo Seguridad</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0A2540",
                        secondary: "#00B4D8",
                        light: "#90E0EF"
                    },
                    fontFamily: {
                        roboto: ['Roboto', 'sans-serif']
                    }
                }
            }
        }
    </script>

</head>

<body class="bg-gray-100 font-roboto">

    <div class="min-h-screen flex">

        
        <div class="hidden md:flex w-1/2 bg-primary text-white flex-col justify-center items-center p-10">

            <h1 class="text-4xl font-bold mb-4">
                Crear Cuenta
            </h1>

            <p class="text-lg text-center max-w-md">
                Regístrate para reportar riesgos, monitorear seguridad
                y mejorar las condiciones en terreno.
            </p>

            

        </div>

        
        <div class="w-full md:w-1/2 flex justify-center items-center">

            <div class="bg-white p-8 rounded-2xl shadow-lg w-[420px]">

                <h2 class="text-2xl font-bold text-center text-primary mb-6">
                    Registro de Usuario
                </h2>

                <form id="registerForm" class="space-y-4">


                    <div class="flex flex-col items-center">
                        <img id="preview"
                             src="https://via.placeholder.com/100"
                             class="w-24 h-24 rounded-full object-cover border mb-2">

                        <input type="file" id="foto" accept="image/*"
                               class="text-sm">
                    </div>

                        
                        <div>
                        <label class="block text-sm mb-1">Nombre</label>
                        <input type="text" id="nombre"
                               class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-secondary"
                               required>
                    </div>

                    
                    <div>
                        <label class="block text-sm mb-1">Correo</label>
                        <input type="email" id="email"
                               class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-secondary"
                               required>
                    </div>

                    
                    <div>
                        <label class="block text-sm mb-1">Contraseña</label>
                        <input type="password" id="password"
                               class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-secondary"
                               required>
                    </div>

                  
                    <div>
                        <label class="block text-sm mb-1">Confirmar contraseña</label>
                        <input type="password" id="confirmPassword"
                               class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-secondary"
                               required>
                    </div>

                    
                    <button type="submit"
                        class="w-full bg-secondary text-white py-2 rounded-lg hover:bg-cyan-600 transition">
                        Registrarse
                    </button>

                </form>

                
                <p id="mensaje" class="text-red-500 text-sm mt-3 text-center"></p>

                
                <p class="text-sm text-center mt-4">
                    ¿Ya tienes cuenta?
                    <a href="index.html" class="text-secondary font-semibold">
                        Inicia sesión
                    </a>
                </p>

            </div>

        </div>

    </div>

  


</body>


<script>
//Para validar registro, tambien se podria modifcar despues
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;

    const mensaje = document.getElementById("mensaje");

    if(password !== confirm){
        mensaje.textContent = "Las contraseñas no coinciden";
        return;
    }

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    const existe = usuarios.find(u => u.email === email);

    if(existe){
        mensaje.textContent = "El usuario ya existe";
        return;
    }

    const nuevoUsuario = {
        nombre,
        email,
        password
    };

    usuarios.push(nuevoUsuario);

    localStorage.setItem("usuarios", JSON.stringify(usuarios));

    alert("Usuario creado correctamente");

    window.location.href = "index.html";
});

</script>
</html>
