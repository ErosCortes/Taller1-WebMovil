<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Peligros en Mina</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body { background:#f4f6f9; }
  header { background:#0dcaf0; color:white; padding:12px; }

  .nivel-alto { border-left:6px solid #dc3545; }
  .nivel-medio { border-left:6px solid #ffc107; }
  .nivel-bajo { border-left:6px solid #198754; }

  .resuelto { opacity:0.6; text-decoration: line-through; }

  .card { border-radius:12px; }

  .alerta {
    position:fixed;
    top:10px;
    right:10px;
    z-index:999;
  }

  @media (max-width: 768px) {
    h4, h5 { text-align:center; }
  }
</style>
</head>
<body>

<header class="text-center">
  <h3>Sistema de Monitoreo de Peligros en Mina</h3>
</header>

<main class="container-fluid mt-3">

<section class="row g-3">

<!-- FORMULARIO -->
<aside class="col-12 col-md-4">
  <h5>Registrar Peligro</h5>
  <form id="formPeligro">
    <input class="form-control form-control-lg mb-2" id="titulo" placeholder="Título" required>
    <textarea class="form-control form-control-lg mb-2" id="descripcion" placeholder="Descripción" required></textarea>

    <select id="ubicacion" class="form-control form-control-lg mb-2" required>
      <option value="">Zona</option>
      <option>Zona Norte</option>
      <option>Zona Sur</option>
      <option>Túnel A</option>
      <option>Túnel B</option>
    </select>

    <select id="nivel" class="form-control form-control-lg mb-2" required>
      <option value="">Nivel</option>
      <option value="bajo">Bajo</option>
      <option value="medio">Medio</option>
      <option value="alto">Alto</option>
    </select>

    <input type="file" id="imagen" class="form-control mb-2">
    <button class="btn btn-primary w-100">Guardar</button>
  </form>
</aside>

<!-- LISTA -->
<section class="col-12 col-md-8">
  <h5>Peligros Registrados</h5>
  <input id="filtro" class="form-control form-control-lg mb-3" placeholder="Buscar por ubicación...">
  <section id="lista" class="row g-3"></section>
</section>

</section>

<!-- ESTADISTICAS -->
<section class="mt-4">
  <h5>Estadísticas</h5>
  <p id="stats"></p>
</section>

</main>

<section id="alerta" class="alerta"></section>

<script>
let editIndex = null;

function obtener(){ return JSON.parse(localStorage.getItem("peligros")) || []; }
function guardar(p){ localStorage.setItem("peligros", JSON.stringify(p)); }

function mostrarAlerta(msg, tipo="success"){
  alerta.innerHTML = `<div class="alert alert-${tipo}">${msg}</div>`;
  setTimeout(()=> alerta.innerHTML="",3000);
}

function claseNivel(n){ return n==="alto"?"nivel-alto":n==="medio"?"nivel-medio":"nivel-bajo"; }

function render(){
  const lista = document.getElementById("lista");
  const filtro = document.getElementById("filtro").value.toLowerCase();

  lista.innerHTML = "";

  let alto=0, medio=0, bajo=0;

  obtener().forEach((p,i)=>{
    if(!p.ubicacion.toLowerCase().includes(filtro)) return;

    if(p.nivel==="alto") alto++;
    if(p.nivel==="medio") medio++;
    if(p.nivel==="bajo") bajo++;

    lista.innerHTML += `
      <article class="col-12 col-md-6">
        <section class="card ${claseNivel(p.nivel)} ${p.resuelto ? 'resuelto' : ''}">
          ${p.imagen ? `<img src="${p.imagen}" class="img-fluid">` : ""}
          <section class="card-body">
            <h6>${p.titulo}</h6>
            <p>${p.descripcion}</p>
            <p><strong>${p.ubicacion}</strong></p>
            <small>${p.fecha}</small><br>

            <button class="btn btn-warning btn-sm w-100 mb-1" onclick="editar(${i})">Editar</button>
            <button class="btn btn-danger btn-sm w-100 mb-1" onclick="eliminar(${i})">Eliminar</button>
            <button class="btn btn-success btn-sm w-100" onclick="resolver(${i})">
              ${p.resuelto ? 'Marcar como pendiente' : 'Marcar como resuelto'}
            </button>
          </section>
        </section>
      </article>`;
  });

  stats.innerText = `Altos: ${alto} | Medios: ${medio} | Bajos: ${bajo}`;
}

function eliminar(i){ let p=obtener(); p.splice(i,1); guardar(p); render(); mostrarAlerta("Eliminado","danger"); }

function editar(i){
  let p = obtener()[i];
  titulo.value = p.titulo;
  descripcion.value = p.descripcion;
  ubicacion.value = p.ubicacion;
  nivel.value = p.nivel;
  editIndex = i;
}

function resolver(i){
  let p = obtener();
  p[i].resuelto = !p[i].resuelto;
  guardar(p);
  render();
  mostrarAlerta(p[i].resuelto ? "Peligro resuelto" : "Peligro reactivado","success");
}

formPeligro.onsubmit = e => {
  e.preventDefault();

  let nuevo = {
    titulo: titulo.value,
    descripcion: descripcion.value,
    ubicacion: ubicacion.value,
    nivel: nivel.value,
    fecha: new Date().toLocaleString(),
    imagen: null,
    resuelto: false
  };

  const reader = new FileReader();

  reader.onload = () => {
    nuevo.imagen = reader.result;
    let p = obtener();

    if(editIndex != null){ p[editIndex] = nuevo; editIndex = null; }
    else{
      p.push(nuevo);
      if(nuevo.nivel === "alto") mostrarAlerta("⚠️ Peligro ALTO","danger");
    }

    guardar(p);
    render();
    formPeligro.reset();
  };

  if(imagen.files[0]) reader.readAsDataURL(imagen.files[0]); else reader.onload();
};

filtro.oninput = render;

render();
</script>

</body>
</html>
