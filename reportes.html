<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Reportar Hallazgos</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        theme:{
            extend:{
                colors:{
                    primary: "#0A2540",
                    secondary: "#00B4D8",
                    light: "#90E0EF"
                },
                fontFamily:{
                    robotoCondensed: ['Roboto Condensed', 'sans-serif']
                }
            }
        }
    }
</script>

</head>

<body class="bg-gray-100 font-robotoCondensed">

<div class="flex h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-primary text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-gray-600">
            Seguridad
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <a href="dashboard.html" class="block p-2 rounded hover:bg-secondary">📊 Dashboard</a>
            <a href="reportes.html" class="block p-2 rounded bg-secondary">⚠️ Reportar</a>
            <a href="mapa.html" class="block p-2 rounded hover:bg-secondary">🗺️ Mapa</a>
        </nav>

        <div class="p-4 border-t border-gray-600">
            <button class="w-full bg-red-500 py-2 rounded hover:bg-red-600">
                Cerrar sesión
            </button>
        </div>
    </aside>

    <!-- CONTENIDO -->
    <div class="flex-1 flex flex-col">

        <header class="bg-white shadow p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-primary">
                Nuevo Hallazgo
            </h1>
        </header>

        <main class="p-6 overflow-auto">

            <div class="w-full mx-auto bg-white p-6 rounded-xl shadow space-y-6">

                <h2 class="text-lg font-bold text-primary">
                    Reportar Condición Insegura
                </h2>

                <form id="reporteFormulario" class="space-y-5">

                    <!-- Imagen -->
                    <div>
                        <label class="block mb-2">Imágenes del hallazgo</label>

                        <input type="file" id="imagen" accept="image/*"
                            class="w-full p-2 border rounded-lg">
                        
                        <img id="preview"
                            class="mt-3 w-full h-60 object-cover rounded-lg hidden">
                    </div> 

                    <!-- Descripción -->
                    <div>
                        <label class="block mb-2">Descripción</label>
                        <textarea id="descripcion"
                        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-secondary"
                        rows="4"
                        placeholder="Describa el problema detectado"
                        required></textarea>
                    </div>

                    <!-- Riesgo -->
                    <div>
                        <label class="block mb-2">Nivel de Riesgo</label>

                        <select id="Riesgo"
                            class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-secondary">
                            <option value="bajo">Bajo</option>
                            <option value="medio">Medio</option>
                            <option value="alto">Alto</option>
                        </select>
                    </div>

                    <!-- Botón -->
                    <div>
                        <button type="submit"
                        class="w-full bg-secondary text-white py-3 rounded-lg hover:bg-cyan-600 transition">
                        Guardar Reporte
                        </button>
                    </div>
            
                </form>
            </div>    

        </main>
    </div>
</div>

<!-- ================== JAVASCRIPT ================== -->

<script>
/* PREVIEW IMAGEN */
document.getElementById("imagen").addEventListener("change", function(e){
    const file = e.target.files[0];
    const preview = document.getElementById("preview");

    if(file){
        const reader = new FileReader();
        reader.onload = function(event){
            preview.src = event.target.result;
            preview.classList.remove("hidden");
        }
        reader.readAsDataURL(file);
    }
});

/* GUARDAR REPORTE */
document.getElementById("reporteFormulario").addEventListener("submit", function(e){
    e.preventDefault();

    const descripcion = document.getElementById("descripcion").value;
    const riesgo = document.getElementById("Riesgo").value;
    const imagenInput = document.getElementById("imagen");

    const nuevoReporte = {
        id: Date.now(),
        fecha: new Date().toISOString(),
        descripcion,
        riesgo,
        imagen: imagenInput.files[0]?.name || "",
        estado: "pendiente"
    };

    let reportes = JSON.parse(localStorage.getItem("reportes")) || [];
    reportes.push(nuevoReporte);

    localStorage.setItem("reportes", JSON.stringify(reportes));

    alert("Reporte guardado correctamente");

    this.reset();
    document.getElementById("preview").classList.add("hidden");
});
</script>

</body>
</html>
